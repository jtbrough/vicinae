name: Release (tagged)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-binary:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ${{ github.repository == 'vicinaehq/vicinae' && '["self-hosted", "Linux", "X64", "prod"]' || '["ubuntu-latest"]' }}
          - arch: aarch64
            runner: '["ubuntu-24.04-arm"]'
    runs-on: ${{ fromJSON(matrix.runner) }}
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    env:
      BUILD_TYPE: Release
      INSTALL_DIR: ${{ github.workspace }}/install

    steps:
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag || '' }}"
            if [[ -z "$TAG" ]]; then
              echo "When dispatching manually, you must provide 'tag' (e.g. v1.2.3)." >&2
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          # Optional: validate tag format like v1.2.3 (allow v1 or v1.2 etc.)
          if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Tag '$TAG' does not match expected format (e.g. v1.2.3)." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "artifact=vicinae-linux-${{ matrix.arch }}-$TAG.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.tag }}

      - name: Install Nix
        if: github.repository != 'vicinaehq/vicinae' || matrix.arch == 'aarch64'
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Prepare dirs
        run: mkdir -p build install

      - name: Configure CMake
        run: |
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
             nix develop --command cmake -G Ninja -S . -B build \
               -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
               -DCMAKE_POLICY_VERSION_MINIMUM=3.5  \
               -DBUILD_TESTS=ON  \
               -DVICINAE_PROVENANCE=binary_release \
               -DLTO=ON \
               -DUSE_SYSTEM_CMARK_GFM=OFF \
               -DCMAKE_INSTALL_PREFIX="${INSTALL_DIR}"
          else
            cd build
            cmake -G Ninja .. \
              -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5  \
              -DBUILD_TESTS=ON  \
              -DVICINAE_PROVENANCE=binary_release \
              -DLTO=ON \
              -DUSE_SYSTEM_CMARK_GFM=OFF \
              -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
              -DCMAKE_INSTALL_PREFIX="${INSTALL_DIR}"
          fi

      - name: Build
        run: |
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
             nix develop --command cmake --build build --config ${BUILD_TYPE} --parallel $(nproc)
          else
             cmake --build build --config ${BUILD_TYPE} --parallel $(nproc)
          fi

      - name: Run Tests
        run: |
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
             nix develop --command make test
          else
             make test
          fi

      - name: Install
        run: |
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
             nix develop --command cmake --install build --config ${BUILD_TYPE}
          else
             cd build
             cmake --install . --config ${BUILD_TYPE}
          fi

      - name: Package (tar install dir)
        run: |
          cd "${INSTALL_DIR}"
          tar -czvf "${{ github.workspace }}/${{ steps.meta.outputs.artifact }}" .

      - name: Fetch sponsors
        id: sponsors
        if: matrix.arch == 'x86_64'
        env:
          GH_TOKEN: ${{ secrets.SPONSORS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          logins=$(gh api graphql -f query='
            query {
              organization(login: "vicinaehq") {
                sponsors(first: 100) {
                  nodes {
                    ... on User { login }
                    ... on Organization { login }
                  }
                }
              }
            }
          ' --jq '.data.organization.sponsors.nodes[].login' 2>/dev/null || true)

          if [[ -z "$logins" ]]; then
            echo "body=" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<SPONSORS_EOF'
              echo ""
              echo "## Sponsors"
              echo ""
              echo "Thanks to our sponsors for supporting vicinae!"
              echo ""
              while IFS= read -r login; do
                echo "- [@${login}](https://github.com/${login})"
              done <<< "$logins"
              echo 'SPONSORS_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.artifact }}

      - name: Append sponsors to release notes
        if: matrix.arch == 'x86_64' && steps.sponsors.outputs.body != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          append_body: true
          body: ${{ steps.sponsors.outputs.body }}


  build-appimage:
    needs: build-binary
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ${{ github.repository == 'vicinaehq/vicinae' && '["self-hosted", "Linux", "X64", "appimage"]' || '["ubuntu-latest"]' }}
          - arch: aarch64
            runner: '["ubuntu-24.04-arm"]'
    runs-on: ${{ fromJSON(matrix.runner) }}
    permissions:
      contents: write
    env:
      BUILD_TYPE: Release
      INSTALL_DIR: ${{ github.workspace }}/install
      APP_DIR: ${{ github.workspace }}/appdir

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.build-binary.outputs.tag }}

      - name: Install Nix
        if: github.repository != 'vicinaehq/vicinae' || matrix.arch == 'aarch64'
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Prepare dirs
        run: mkdir -p build install

      - name: Configure CMake
        run: |
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
            nix develop --command cmake -G Ninja -S . -B build   \
              -DCMAKE_BUILD_TYPE=${BUILD_TYPE}          \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5        \
              -DCMAKE_INSTALL_PREFIX="${INSTALL_DIR}"   \
              -DVICINAE_PROVENANCE=appimage             \
              -DLTO=ON
          else
            cd build
            cmake -G Ninja ..                           \
              -DCMAKE_BUILD_TYPE=${BUILD_TYPE}          \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5        \
              -DCMAKE_INSTALL_PREFIX="${INSTALL_DIR}"   \
              -DVICINAE_PROVENANCE=appimage             \
              -DLTO=ON
          fi

      - name: Build
        run: |
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
            nix develop --command cmake --build build --config ${BUILD_TYPE} --parallel $(nproc)
          else
            cmake --build build --config ${BUILD_TYPE} --parallel $(nproc)
          fi

      - name: Install
        run: |
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
            nix develop --command cmake --install build
          else
            cmake --install build
          fi

      - name: Make AppImage
        run: |
          chmod +x ./scripts/mkappimage.sh
          if [[ "${{ github.repository }}" != "vicinaehq/vicinae" || "${{ matrix.arch }}" == "aarch64" ]]; then
             nix develop --command ./scripts/mkappimage.sh "${INSTALL_DIR}" "${APP_DIR}"
          else
             ./scripts/mkappimage.sh "${INSTALL_DIR}" "${APP_DIR}"
          fi

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-binary.outputs.tag }}
          name: ${{ needs.build-binary.outputs.tag }}
          files: |
            *.AppImage

  trigger-packaging:
    needs: [build-binary, build-appimage]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bumpver in packaging-arch
        env:
          GH_TOKEN: ${{ secrets.PACKAGING_AUR_TOKEN }}
        run: |
          gh workflow run bumpver.yml --repo vicinaehq/packaging-arch

